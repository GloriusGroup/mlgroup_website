<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
    <defs>
        <!-- Gradients for a polished, 3D-like mascot feel -->
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4C566A" />
            <stop offset="100%" stop-color="#2E3440" />
        </linearGradient>
        
        <linearGradient id="bellyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E5E9F0" />
            <stop offset="100%" stop-color="#D8DEE9" />
        </linearGradient>

        <linearGradient id="legGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#EBCB8B" />
            <stop offset="100%" stop-color="#D08770" />
        </linearGradient>

        <linearGradient id="wingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#434C5E" />
            <stop offset="100%" stop-color="#3B4252" />
        </linearGradient>
    </defs>

    <style>
        /* Core Run Cycle Timing */
        :root {
            --run-speed: 0.6s;
        }

        /* 1. Body Bounce */
        .emu-body-group {
            animation: bounce 0.6s infinite cubic-bezier(0.4, 0.0, 0.6, 1);
        }
        @keyframes bounce {
            0%, 50%, 100% { transform: translateY(0px); }
            25%, 75% { transform: translateY(-16px); }
        }

        /* 2. Leg Animations */
        .hip {
            animation: swing-hip 0.6s infinite linear;
            transform-origin: 0px 0px;
        }
        .knee {
            animation: bend-knee 0.6s infinite linear;
            transform-origin: 0px 0px;
        }
        
        .leg-l.hip, .leg-l .knee {
            animation-delay: -0.3s;
        }

        @keyframes swing-hip {
            0% { transform: rotate(35deg); }    
            50% { transform: rotate(-40deg); }  
            100% { transform: rotate(35deg); }
        }
        @keyframes bend-knee {
            0% { transform: rotate(0deg); }      
            25% { transform: rotate(65deg); }    
            50% { transform: rotate(5deg); }     
            75% { transform: rotate(15deg); }    
            100% { transform: rotate(0deg); }
        }

        /* 3. Head & Neck Counter-Bob */
        .neck-head {
            animation: head-bob 0.6s infinite ease-in-out;
            transform-origin: 15px 20px;
        }
        @keyframes head-bob {
            0%, 50%, 100% { transform: rotate(0deg) translateY(0px); }
            25%, 75% { transform: rotate(4deg) translateY(6px); }
        }

        /* 4. Wing Flapping */
        .wing {
            animation: wing-flap 0.6s infinite ease-in-out;
            transform-origin: -10px -10px;
        }
        @keyframes wing-flap {
            0%, 50%, 100% { transform: rotate(0deg); }
            25%, 75% { transform: rotate(-25deg); }
        }

        /* 5. Tail Wagging */
        .tail {
            animation: tail-wag 0.6s infinite ease-in-out;
            transform-origin: 0px 0px;
        }
        @keyframes tail-wag {
            0%, 50%, 100% { transform: rotate(0deg); }
            25%, 75% { transform: rotate(15deg); }
        }

        /* 6. Bandana Flap */
        .bandana-tail {
            animation: bandana-flap 0.3s infinite alternate ease-in-out;
            transform-origin: 0px 0px;
        }
        @keyframes bandana-flap {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(35deg); }
        }

        /* 7. Ground Shadow */
        .shadow {
            animation: shadow-scale 0.6s infinite ease-in-out;
            transform-origin: 400px 295px; 
        }
        @keyframes shadow-scale {
            0%, 50%, 100% { transform: scale(1); opacity: 0.2; }
            25%, 75% { transform: scale(0.6); opacity: 0.05; }
        }

        /* 8. Dust Puffs */
        .dust {
            animation: dust-puff 0.6s infinite ease-out;
            transform-origin: 390px 285px; 
            opacity: 0;
        }
        .dust-l { animation-delay: -0.3s; }
        
        @keyframes dust-puff {
            0% { transform: scale(0.3) translate(0px, 0px); opacity: 0; }
            5% { opacity: 0.7; }
            100% { transform: scale(1.8) translate(-60px, -15px); opacity: 0; }
        }

        /* 9. Background Speed Lines */
        .speed-line {
            animation: pan-lines 0.8s infinite linear;
            stroke-linecap: round;
        }
        .sl-2 { animation-duration: 0.5s; animation-delay: 0.2s; }
        .sl-3 { animation-duration: 1.1s; animation-delay: 0.5s; }
        
        @keyframes pan-lines {
            0% { transform: translateX(800px); }
            100% { transform: translateX(-800px); }
        }
    </style>

    <!-- Background Elements -->
    <g class="background">
        <!-- Soft Ground Shadow (Centered) -->
        <ellipse class="shadow" cx="400" cy="295" rx="110" ry="12" fill="#000000" />
        
        <!-- Animated Dust Impacts -->
        <g class="dust dust-r">
            <circle cx="390" cy="285" r="12" fill="#D8DEE9" />
            <circle cx="405" cy="280" r="8" fill="#E5E9F0" />
            <circle cx="375" cy="290" r="10" fill="#D8DEE9" />
        </g>
        <g class="dust dust-l">
            <circle cx="390" cy="285" r="14" fill="#D8DEE9" />
            <circle cx="400" cy="275" r="9" fill="#E5E9F0" />
            <circle cx="370" cy="287" r="11" fill="#D8DEE9" />
        </g>

        <!-- Motion Speed Lines -->
        <line class="speed-line sl-1" x1="0" y1="260" x2="150" y2="260" stroke="#E5E9F0" stroke-width="4" opacity="0.6"/>
        <line class="speed-line sl-2" x1="200" y1="310" x2="300" y2="310" stroke="#D8DEE9" stroke-width="3" opacity="0.8"/>
        <line class="speed-line sl-3" x1="100" y1="180" x2="280" y2="180" stroke="#E5E9F0" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- POSITIONING WRAPPER: This locks the emu to the dead center (400, 200) so the CSS doesn't break it -->
    <g transform="translate(400, 190)">
        
        <!-- ANIMATION WRAPPER: This handles the bounce relative to the center -->
        <g class="emu-body-group">
            
            <!-- Right Leg (Background) -->
            <g class="leg-r hip" transform="translate(-10, 30)">
                <path d="M0,0 C-10,35 -5,65 0,80" stroke="url(#legGrad)" stroke-width="16" stroke-linecap="round" fill="none"/>
                <g class="knee" transform="translate(0, 80)">
                    <path d="M0,0 C10,35 15,60 15,80 L40,85" stroke="url(#legGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <!-- Toes -->
                    <path d="M40,85 L32,75 M40,85 L32,93 M40,85 L48,90" stroke="url(#legGrad)" stroke-width="5" stroke-linecap="round"/>
                </g>
            </g>

            <!-- Tail Feathers -->
            <g class="tail" transform="translate(-85, 15)">
                <path d="M 0,0 C -30,-15 -50,15 -65,-5 C -50,15 -35,35 0,25 Z" fill="#3B4252"/>
                <path d="M -5,10 C -40,-5 -55,25 -70,10 C -55,25 -40,40 -5,30 Z" fill="#2E3440"/>
            </g>

            <!-- Neck and Head Group -->
            <g class="neck-head" transform="translate(70, -20)">
                
                <!-- Neck Path -->
                <path d="M -15,20 C -25,-40 10,-80 15,-120 L 45,-120 C 45,-80 15,-40 20,20 Z" fill="url(#bellyGrad)"/>
                
                <!-- Head Base -->
                <ellipse cx="30" cy="-125" rx="35" ry="30" fill="url(#bellyGrad)"/>
                
                <!-- Head Feathers & Tufts -->
                <path d="M -5,-125 C -5,-155 65,-155 65,-125 C 65,-135 30,-105 -5,-125 Z" fill="#4C566A"/>
                <path d="M 25,-153 C 15,-175 5,-180 0,-165 C 10,-175 20,-165 25,-153 Z" fill="#4C566A"/>
                <path d="M 40,-153 C 40,-180 50,-185 55,-165 C 45,-175 45,-165 40,-153 Z" fill="#4C566A"/>

                <!-- Beak -->
                <path d="M 60,-135 C 85,-135 100,-125 100,-115 C 100,-105 70,-110 55,-110 Z" fill="#EBCB8B"/>
                <path d="M 55,-120 Q 75,-120 95,-115" stroke="#D08770" stroke-width="2.5" fill="none" stroke-linecap="round"/> 
                
                <!-- Eyes -->
                <circle cx="45" cy="-135" r="9" fill="#2E3440"/>
                <circle cx="47" cy="-138" r="3" fill="#FFFFFF"/> 
                <circle cx="42" cy="-133" r="1.5" fill="#FFFFFF"/> 
                
                <!-- Rosy Cheek -->
                <ellipse cx="33" cy="-113" rx="9" ry="5.5" fill="#BF616A" opacity="0.7"/>

                <!-- Red GitHub Bandana -->
                <path d="M -15,10 C 15,0 35,0 50,-15 C 20,-5 0,-15 -15,10 Z" fill="#BF616A"/>
                <g class="bandana-tail" transform="translate(0, 5)">
                    <path d="M 0,0 C -25,10 -35,35 -45,25 C -30,5 -15,-5 0,0 Z" fill="#BF616A"/>
                    <path d="M -5,5 C -20,20 -25,40 -35,35 C -25,15 -10,0 -5,5 Z" fill="#A3BE8C" opacity="0.6"/>
                </g>
            </g>

            <!-- Main Fluffy Body -->
            <path d="M -90,10 C -110,50 -70,95 0,95 C 80,95 110,50 110,0 C 110,-40 60,-65 0,-55 C -50,-45 -70,-30 -90,10 Z" fill="url(#bodyGrad)"/>
            
            <!-- Belly Overlay -->
            <path d="M -50,60 C -20,90 40,95 80,50 C 95,30 105,10 105,-5 C 105,-20 80,10 40,30 C -10,50 -30,40 -50,60 Z" fill="url(#bellyGrad)" opacity="0.8"/>

            <!-- Left Leg (Foreground) -->
            <g class="leg-l hip" transform="translate(15, 38)">
                <path d="M0,0 C-10,35 -5,65 0,80" stroke="url(#legGrad)" stroke-width="16" stroke-linecap="round" fill="none"/>
                <g class="knee" transform="translate(0, 80)">
                    <path d="M0,0 C10,35 15,60 15,80 L40,85" stroke="url(#legGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <!-- Toes -->
                    <path d="M40,85 L32,75 M40,85 L32,93 M40,85 L48,90" stroke="url(#legGrad)" stroke-width="5" stroke-linecap="round"/>
                </g>
            </g>

            <!-- Animated Wing -->
            <g class="wing" transform="translate(-10, -5)">
                <path d="M -15,-10 C 30,-10 65,15 45,50 C 20,85 -15,70 -35,35 C -55,0 -45,-10 -15,-10 Z" fill="url(#wingGrad)" stroke="#2E3440" stroke-width="4" stroke-linejoin="round"/>
                <path d="M 5,5 C 20,15 35,35 25,45" stroke="#2E3440" stroke-width="3" stroke-linecap="round" fill="none"/>
                <path d="M -10,15 C 5,25 20,45 10,55" stroke="#2E3440" stroke-width="3" stroke-linecap="round" fill="none"/>
                <path d="M -25,25 C -15,35 0,55 -10,60" stroke="#2E3440" stroke-width="3" stroke-linecap="round" fill="none"/>
            </g>
            
        </g>
    </g>
</svg>